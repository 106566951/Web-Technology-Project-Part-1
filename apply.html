<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="The Coders" content="">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Page</title>
    <link rel="stylesheet" href="style.css">
    <style></style>
</head>
<body>
    <header>
        <h1>Application</h1>
    </header>
    <form action="https://mercury.swin.edu.au/it000000/formtest.php">
        <fieldset>
            <legend>Job Vacancy</legend>
            <p>
                <label for="reference_number">Job Reference Number:</label>
                <input type="text" id="reference_number" name="reference_number" maxlength="5" minlength="5" pattern="" required>
            </p>
        </fieldset>
        <fieldset>
            <legend>Applicant Details</legend>
            <p>
                <label for="first_name">First Name:</label>
                <input type="text" id="first_name" maxlength="20" pattern="" required>
            </p>
            <p>
                <label for="last_name">Last Name:</label>
                <input type="text" id="last_name" maxlength="20" pattern="" required>
            </p>
            <p>
                <label for="DOB">Date of Birth:</label>
                <input type="text" name="date" id="DOB" placeholder="dd/mm/yyyy" maxlength="10" size="10" pattern="\d{2}/\d{2}/\d{4}" required>
            </p>
        </fieldset>
        <fieldset>
            <legend>Gender</legend>
            <p>
                <input type="radio" name="other" id="other" value="other" required checked>
                <label for="other">Other</label>
                <input type="radio" id="male" name="male" value="male">
                <label for="male">Male</label>
                <input type="radio" name="female" id="female" value="female">
                <label for="female">Female</label>
            </p>
        </fieldset>
        <fieldset>
            <legend>Applicant Address</legend>
            <p>
                <label for="street">Street Address:</label>
                <input type="text" name="street" id="street" maxlength="40" pattern="" required>
            </p>
            <p>
                <label for="town">Suburb/Town:</label>
                <input type="text" name="town" id="town" maxlength="40" pattern="" required>
            </p>
            <p>
                <label for="state">State:</label>
                <select name="state" id="state" required>
                    <option value="">Select State</option>
                    <option value="vic">VIC</option>
                    <option value="nsw">NSW</option>
                    <option value="qld">QLD</option>
                    <option value="nt">NT</option>
                    <option value="wa">WA</option>
                    <option value="sa">SA</option>
                    <option value="tas">TAS</option>
                    <option value="act">ACT</option>
                </select>
            </p>
            <p>
                <label for="postcode">Postcode:</label>
                <input type="text" name="postcode" id="postcode" maxlength="4" minlength="4" pattern="" required>
            </p>
        </fieldset>
        <fieldset>
            <legend>Applicant Contact Details</legend>
            <p>
                <label for="email">Email</label>
                <input type="email" name="email" id="email" required>
            </p>
            <p>
                <label for="number">Mobile Number:</label>
                <input type="text" name="number" id="number" minlength="8" maxlength="12" pattern="" required>
            </p>
        </fieldset>
        <fieldset>
            <legend>Applicant Skill-set</legend>
            <p>
                <label for="comms">Communication</label>
                <input type="checkbox" name="skills[]" id="comms" value="comms">
                <label for="strategy">Consultation Strategy Design</label>
                <input type="checkbox" name="skills[]" id="strategy" value="strategy">
            </p>
            <p>
                <label for="skills">Other Skills</label><br>
                <textarea name="skills" id="skills" rows="5" cols="30" placeholder="List another skills you think may be useful for this position..."></textarea>
            </p>
        </fieldset>
        <input type= "submit" value="Submit">
	    <input type= "reset" value="Reset Form">
    </form>
    <footer></footer>
</body>
</html>
